name: minify Lua files

on:
  push:
    branches:
      - main

jobs:
  minify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Luamin
        run: npm install -g luamin

      - name: Minify Lua files
        run: |
          find . -name "*.lua" -not -path "./.git/*" -exec sh -c '
            for file do
              tmp=$(mktemp)
              if luamin -f "$file" > "$tmp"; then
                mv "$tmp" "$file"
                echo "minified: $file"
              else
                echo "failed to minify: $file"
                rm "$tmp"
              fi
            done
          ' _ {} +

      - name: Make archive thingy
        run: |
          zip -r minified.zip . -x "*.git*" -x "*.github*"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-minified
          name: "Latest build"
          body: "Actions build."
          draft: false
          prerelease: false
          files: minified.zip